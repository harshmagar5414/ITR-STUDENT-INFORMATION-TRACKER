{% extends "layout.html" %}

{% block title %}Marks Management{% endblock %}

{% block content %}

<div class="page-header">
    <h1>Marks Management</h1>
    <p>Add and manage student examination marks.</p>
</div>

<div class="form-container">

    <form action="{{ url_for('marks') }}" method="POST">

        <div class="form-grid">

            <div class="form-group">
                <label>Student ID</label>
                <input type="text" name="student_id" required>
            </div>

            <div class="form-group">
                <label>Student Name</label>
                <input type="text" name="student_name" required>
            </div>

            <div class="form-group">
                <label>Department</label>
                <input type="text" name="department" required>
            </div>

            <div class="form-group">
                <label>Semester</label>
                <select name="semester" required>
                    <option value="">Select Semester</option>
                    <option>Semester 1</option>
                    <option>Semester 2</option>
                    <option>Semester 3</option>
                    <option>Semester 4</option>
                    <option>Semester 5</option>
                    <option>Semester 6</option>
                    <option>Semester 7</option>
                    <option>Semester 8</option>
                </select>
            </div>

            <div class="form-group">
                <label>Subject</label>
                <input type="text" name="subject" required>
            </div>

            <div class="form-group">
                <label>Maximum Marks</label>
                <input type="number" name="max_marks" value="100" required>
            </div>

            <div class="form-group">
                <label>Obtained Marks</label>
                <input type="number" name="obtained_marks" required>
            </div>

            <div class="form-group">
                <label>Grade</label>
