{% extends "layout.html" %}

{% block title %}Settings{% endblock %}

{% block content %}

<div class="page-header">
    <h1>System Settings</h1>
    <p>Configure the ERP System.</p>
</div>

<div class="form-container">

    <form action="{{ url_for('settings') }}" method="POST">

        <div class="form-grid">

            <div class="form-group">
                <label>Institute Name</label>
                <input type="text" name="institute_name"
                       value="{{ settings.institute_name if settings else '' }}" required>
            </div>

            <div class="form-group">
                <label>Institute Email</label>
                <input type="email" name="email"
                       value="{{ settings.email if settings else '' }}" required>
            </div>

            <div class="form-group">
                <label>Contact Number</label>
                <input type="text" name="phone"
                       value="{{ settings.phone if settings else '' }}" required>
            </div>

            <div class="form-group">
                <label>Academic Year</label>
                <input type="text" name="academic_year"
                       placeholder="2026-2027"
                       value="{{ settings.academic_year if settings else '' }}" required>
            </div>

            <div class="form-group">
                <label>Principal Name</label>
                <input type="text" name="principal"
                       value="{{ settings.principal if settings else '' }}">
            </div>

            <div class="form-group">
                <label>ERP Theme</label>

                <select name="theme">
                    <option>Light</option>
                    <option>Dark</option>
                </select>

            </div>

            <div class="form-group" style="grid-column:1/3;">
                <label>Institute Address</label>

                <textarea name="address" rows="4">{{ settings.address if settings else '' }}</textarea>

            </div>

        </div>

        <div class="button-group">
            <button type="submit">Save Settings</button>
            <button type="reset">Reset</button>
        </div>

    </form>

</div>

{% endblock %}
